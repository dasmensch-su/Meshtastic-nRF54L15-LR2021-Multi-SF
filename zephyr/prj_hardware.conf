# Meshtastic nRF54L15 — Hardware build configuration
#
# Use this overlay for real XIAO nRF54L15 hardware (not Renode simulation).
# Build with:
#   west build -b xiao_nrf54l15/nrf54l15/cpuapp -- \
#     -DEXTRA_CONF_FILE=prj_hardware.conf \
#     -DDTC_OVERLAY_FILE=boards/xiao_nrf54l15_nrf54l15_cpuapp_hardware.overlay \
#     -DCONFIG_MESHTASTIC_FULL_STACK=y

# ---- Core peripherals (same as simulation) ----
CONFIG_SPI=y
CONFIG_GPIO=y
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_PRINTK=y
# UART console is always off on hardware: the UART belongs to SerialConsole
# for the meshtastic CLI. Debug text (when enabled) goes out SEGGER RTT
# instead. See MESHTASTIC_DEBUG_LOGGING below.
CONFIG_UART_CONSOLE=n

# ---- C++ support ----
CONFIG_CPP=y
CONFIG_STD_CPP17=y
CONFIG_REQUIRES_FLOAT_PRINTF=y

# ---- Stack / heap ----
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_HEAP_MEM_POOL_SIZE=32768

# BLE RX thread needs extra stack for PhoneAPI protobuf serialization in GATT callbacks
CONFIG_BT_RX_STACK_SIZE=4096

# ---- Debug logging (SEGGER RTT) ----
# CONFIG_MESHTASTIC_DEBUG_LOGGING (default y) selects LOG, LOG_BACKEND_RTT,
# USE_SEGGER_RTT, RTT_CONSOLE, LOG_PRINTK. Set =n to drop ~120 KB of flash
# in production builds where remote log capture isn't needed.
CONFIG_MESHTASTIC_DEBUG_LOGGING=y
CONFIG_LOG_DEFAULT_LEVEL=2
CONFIG_LOG_BUFFER_SIZE=4096
CONFIG_LOG_BACKEND_UART=n
# 4 KB RTT up-buffer, drop-on-overflow so a stalled host never stalls
# the firmware main loop. NOTE: 16 KB caused cold-boot heap exhaustion
# (NodeDB default vector alloc 19.6 KB failed) — keep at 4 KB unless heap
# can be enlarged.
CONFIG_SEGGER_RTT_BUFFER_SIZE_UP=4096
CONFIG_SEGGER_RTT_MODE_NO_BLOCK_SKIP=y
CONFIG_LOG_BACKEND_RTT_MODE_DROP=y

# ---- CRACEN hardware crypto + entropy ----
# nRF54L15 CRACEN provides TRNG and AES acceleration.
# This was disabled for Renode (no TRNG simulation) but works on real hardware.
CONFIG_ENTROPY_GENERATOR=y
CONFIG_ENTROPY_NRF_CRACEN_CTR_DRBG=y
CONFIG_NRF54L15_HARDWARE_CRYPTO=y

# ---- BLE Phone API (connectable peripheral) ----
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="Meshtastic"
CONFIG_BT_DEVICE_NAME_DYNAMIC=y
CONFIG_BT_DEVICE_NAME_MAX=32
# Large MTU for protobuf messages (~500 bytes)
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_ATT_PREPARE_COUNT=5
CONFIG_BT_GATT_CLIENT=n
# BLE controller needs crypto for connection encryption
CONFIG_BT_CTLR_CRYPTO=y
# Extra RX buffers and disable auto-negotiation that may confuse older adapters
CONFIG_BT_CTLR_RX_BUFFERS=6
CONFIG_BT_BUF_ACL_TX_COUNT=6
CONFIG_BT_ATT_TX_COUNT=6
CONFIG_BT_CONN_TX_MAX=6
# BLE debug logging for connection issues
CONFIG_BT_LOG_LEVEL_WRN=y

# ---- Power management (board defaults) ----
CONFIG_PM_DEVICE=y
CONFIG_NRFX_POWER=y
CONFIG_REGULATOR=y
CONFIG_POWEROFF=y

# ---- Hardware protection ----
CONFIG_ARM_MPU=y
CONFIG_HW_STACK_PROTECTION=y
CONFIG_CACHE_MANAGEMENT=y
CONFIG_EXTERNAL_CACHE=y

# ---- OLED display (SSD1306 128x64 on LoRa Plus expansion board) ----
CONFIG_I2C=y
CONFIG_DISPLAY=y
CONFIG_SSD1306=y
CONFIG_CHARACTER_FRAMEBUFFER=y
CONFIG_CHARACTER_FRAMEBUFFER_USE_DEFAULT_FONTS=y

# ---- System ----
CONFIG_REBOOT=y

# ---- LittleFS persistence (config + NodeDB survive reboot) ----
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_LITTLEFS=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y

# ---- Boot ----
CONFIG_BOOT_BANNER=y
CONFIG_NRF_GRTC_START_SYSCOUNTER=y
