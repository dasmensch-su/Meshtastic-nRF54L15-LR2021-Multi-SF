# Meshtastic nRF54L15 — Phase 1/2/3: Boot, radio init, BLE advertising
CONFIG_SPI=y
CONFIG_GPIO=y
CONFIG_SERIAL=y
CONFIG_PRINTK=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
# Required by mesh_zephyr.cpp::zephyr_serial_rx_init() — IRQ-driven RX
# on the console UART backs the Arduino Serial.available()/read() shim
# so SerialConsole can receive ToRadio frames from `meshtastic --port`.
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_LOG=n
CONFIG_BOOT_BANNER=n

# Entropy: CRACEN CTR-DRBG is auto-enabled (default y) when DT has nordic,nrf-cracen-ctrdrbg.
# The Renode CRACENCORE model does not implement the TRNG FSM or FIFO auto-fill,
# so the driver spins forever on init. Disable for Phase 1 (boot only).
# Phase 4 will implement a Renode CRACENCORE TRNG workaround.
CONFIG_ENTROPY_NRF_CRACEN_CTR_DRBG=n
CONFIG_ENTROPY_GENERATOR=n

# C++ support (Meshtastic is C++)
CONFIG_CPP=y
CONFIG_STD_CPP17=y
CONFIG_REQUIRES_FLOAT_PRINTF=y

# Stack size — Meshtastic needs more than the 1 KB default
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_HEAP_MEM_POOL_SIZE=65536

# AES encryption: software AES-128/256-CTR embedded in platform stubs
# For hardware: wire to CRACEN or mbedTLS (see docs/QUESTIONS.md Q1)

# Phase 3: BLE advertising (non-connectable broadcaster)
# nRF54L15 uses Zephyr's open-source BLE controller (BT_LL_SW_SPLIT).
# No nrfxlib SDC required. RADIO IRQ 138 → NVIC wired in robot test.
CONFIG_BT=y
CONFIG_BT_BROADCASTER=y
CONFIG_BT_DEVICE_NAME="Meshtastic"
CONFIG_BT_DEVICE_NAME_DYNAMIC=n
# Disable BLE host crypto — not needed for non-connectable advertising
CONFIG_BT_HOST_CRYPTO=n
CONFIG_BT_CTLR_CRYPTO=n
